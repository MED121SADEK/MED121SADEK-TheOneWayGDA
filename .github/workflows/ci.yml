# ═══════════════════════════════════════════════════════════
# The One-Way — Continuous Integration Pipeline
# Triggers on every push and PR to main/master
# Validates: build, types, lint, prisma, security
# ═══════════════════════════════════════════════════════════

name: CI Pipeline

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]

# Cancel in-progress runs for the same branch
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_ENV: test
  DATABASE_URL: "file:./test.db"

jobs:
  # ── Job 1: Code Quality ──
  quality:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            .next/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: TypeScript type check
        run: bunx tsc --noEmit
        continue-on-error: false

      - name: ESLint
        run: bun run lint
        continue-on-error: true  # Lint warnings don't block CI

  # ── Job 2: Build Verification ──
  build:
    name: Build Verification
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            .next/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate Prisma Client
        run: bunx prisma generate

      - name: Push test schema
        run: bunx prisma db push --skip-generate
        env:
          DATABASE_URL: "file:./db/test-ci.db"

      - name: Next.js build
        run: bun run build
        env:
          DATABASE_URL: "file:./db/test-ci.db"

  # ── Job 3: Security Scan ──
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Check for known vulnerabilities
        run: bunx audit-ci --moderate
        continue-on-error: true  # Warnings only, not blocking

      - name: Verify no .env committed
        run: |
          if grep -r "ADMIN_SECRET=oneway-admin" .env 2>/dev/null; then
            echo "WARNING: Production .env may be committed"
          fi
          if [ -f ".env.production" ]; then
            echo "ERROR: .env.production should not be in version control"
            exit 1
          fi

      - name: Check for hardcoded secrets
        run: |
          PATTERNS="(sk-|sk_live|pk_live|SECRET|PASSWORD|TOKEN).{8,}"
          if grep -rn "$PATTERNS" src/ --include="*.ts" --include="*.tsx" | grep -v "process.env" | grep -v "NEXT_PUBLIC" | grep -v "// " | head -5; then
            echo "WARNING: Potential hardcoded secrets detected"
          fi

  # ── Job 4: Prisma Schema Validation ──
  database:
    name: Database Schema
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Validate Prisma schema
        run: bunx prisma validate

      - name: Format check
        run: bunx prisma format --check
        continue-on-error: true

      - name: Generate client (verify no errors)
        run: bunx prisma generate

  # ── Job 5: API Routes Validation ──
  api-check:
    name: API Routes Check
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Generate Prisma Client
        run: bunx prisma generate
        env:
          DATABASE_URL: "file:./db/test-ci.db"

      - name: Verify all API routes have exports
        run: |
          echo "Checking API routes for proper exports..."
          ERRORS=0
          for file in src/app/api/**/route.ts; do
            if [ -f "$file" ]; then
              if ! grep -q "export async function GET\|export async function POST\|export async function PUT\|export async function DELETE\|export async function PATCH\|export function GET\|export function POST" "$file"; then
                echo "WARNING: $file has no exported handler"
              fi
            fi
          done
          echo "API route validation complete"

      - name: Check for error type safety
        run: |
          echo "Checking for unsafe error handling..."
          UNSAFE=$(grep -rn "catch.*{.*}" src/app/api/ --include="*.ts" | grep -v "unknown" | grep "catch (error)" | head -5 || true)
          if [ -n "$UNSAFE" ]; then
            echo "Found potentially unsafe error catches (should use 'catch (error: unknown)')"
          fi
