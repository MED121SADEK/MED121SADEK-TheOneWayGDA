<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Model Comparison & Leaderboard Platform</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 800px;
            text-align: center;
        }

        h1 {
            color: #667eea;
            margin-bottom: 20px;
            font-size: 2.5em;
        }

        .subtitle {
            color: #666;
            font-size: 1.2em;
            margin-bottom: 30px;
        }

        .projects {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 30px;
        }

        .project-card {
            background: #f8f9fa;
            padding: 25px;
            border-radius: 10px;
            text-decoration: none;
            color: #333;
            transition: all 0.3s ease;
            border: 2px solid transparent;
        }

        .project-card:hover {
            border-color: #667eea;
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.2);
        }

        .project-card h2 {
            color: #667eea;
            margin-bottom: 10px;
            font-size: 1.5em;
        }

        .project-card p {
            color: #666;
            font-size: 0.95em;
            line-height: 1.6;
        }

        .emoji {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .button {
            display: inline-block;
            margin-top: 15px;
            padding: 10px 20px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.95em;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .button:hover {
            background: #5568d3;
            transform: scale(1.05);
        }

        @media (max-width: 600px) {
            .projects {
                grid-template-columns: 1fr;
            }

            h1 {
                font-size: 2em;
            }

            .container {
                padding: 25px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 MED121SADEK Projects</h1>
        <p class="subtitle">AI Model Comparison & Leaderboard Platform</p>

        <div class="projects">
            <a href="./todo-app/" class="project-card">
                <div class="emoji">📝</div>
                <h2>To-Do List App</h2>
                <p>A modern to-do list with local storage. Add, edit, and manage your tasks with priorities and due dates.</p>
                <button class="button">Open App →</button>
            </a>

            <a href="https://github.com/MED121SADEK/MED121SADEK-TheOneWayGDA" class="project-card">
                <div class="emoji">💾</div>
                <h2>View on GitHub</h2>
                <p>Check out the full repository with all source code, documentation, and project details.</p>
                <button class="button">Go to Repo →</button>
            </a>
        </div>
    </div>
</body>
</html>
